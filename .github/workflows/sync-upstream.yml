name: Sync Upstream

on:
  schedule: [ cron: '0 0,12 * * 1,3,5,0' ]
  workflow_dispatch:
  
jobs:
  update:
    name: Update the repo's code with changes from upstream
    permissions: { contents: write }
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with: { fetch-depth: 0 } # Git will fail the merge without history
      
      - name: Tell Git who we are
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream repo as a remote & merge upstream changes preferring theirs
        run: |
          git remote add upstream https://github.com/searxng/searxng 
          git fetch upstream
          git merge -X theirs upstream/master -m "Sync upstream"

      - name: Install Ubuntu packages
        run: sudo ./utils/searxng.sh install buildhost

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: '3.9', architecture: 'x64' }

      - name: Cache Python dependencies
        id: cache-python
        uses: actions/cache@v4
        with:
          path: |
            ./local
            ./.nvm
            ./node_modules
          key: python-ubuntu-20.04-3.9-${{ hashFiles('requirements*.txt', 'setup.py','.nvmrc', 'package.json') }}

      - name: Install node dependencies & rebuild themes with our changes
        run: |
          make V=1 node.env 
          make V=1 themes.all
      
      - name: Push their changes combined with ours
        run: |
          git add --all
          git commit -am "[build] /static" 
          git status
          git push

  docker:
    name: Update docker image
    needs: [ update ]
    permissions: { packages: write }
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with: { fetch-depth: 0 } # Make sure "make docker.push" can get the git history

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: '3.9', architecture: 'x64' }

      - name: Cache Python dependencies
        id: cache-python
        uses: actions/cache@v4
        with:
          path: |
            ./local
            ./.nvm
            ./node_modules
          key: python-ubuntu-20.04-3.9-${{ hashFiles('requirements*.txt', 'setup.py','.nvmrc', 'package.json') }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: make -e GIT_URL=$(git remote get-url origin) docker.buildx
